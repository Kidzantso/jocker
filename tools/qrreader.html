<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Code Reader</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .drop-zone {
      border: 2px dashed #61dafb;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #aaa;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .drop-zone.dragover {
      background: rgba(97,218,251,0.1);
      color: #61dafb;
    }
    #qrResult {
      margin-top: 15px;
      background: #222;
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      min-height: 40px;
    }
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #61dafb;
      color: #000;
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .notification.show {
      opacity: 1;
    }
  </style>
</head>
<body>
<div class="tool-container">
  <h2>QR Code Reader</h2>
  <p>Paste, upload, or drag & drop a QR code image:</p>

  <textarea id="clipboardArea" placeholder="Paste image here (Ctrl+V)" rows="3"></textarea>
  <label for="fileInput" class="file-btn">Choose QR Code Image</label>
  <input type="file" id="fileInput" accept="image/*" hidden>
  <div id="dropZone" class="drop-zone">Drag & Drop QR Code Image Here</div>

  <div id="qrResult">No QR code detected yet.</div>
  <button id="copyBtn">Copy Result</button>
</div>

<div id="notification" class="notification">Copied to clipboard!</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script>
  const qrResult = document.getElementById('qrResult');

  function decodeImage(img) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);
    qrResult.textContent = code ? code.data : "No QR code found.";
  }

  // Handle file input
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => decodeImage(img);
    img.src = URL.createObjectURL(file);
  });

  // Handle drag & drop
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => decodeImage(img);
    img.src = URL.createObjectURL(file);
  });

  // Handle paste from clipboard
  document.getElementById('clipboardArea').addEventListener('paste', e => {
    const items = e.clipboardData.items;
    for (const item of items) {
      if (item.type.indexOf("image") !== -1) {
        const file = item.getAsFile();
        const img = new Image();
        img.onload = () => decodeImage(img);
        img.src = URL.createObjectURL(file);
      }
    }
  });

  // Copy result
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = qrResult.textContent;
    if (text.trim()) {
      navigator.clipboard.writeText(text).then(() => {
        const notif = document.getElementById('notification');
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 2000);
      });
    }
  });
</script>
</body>
</html>
